<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PGBook | Register</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">PGBook</div>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      </nav>
    </header>

    <main class="container form-page">
      <div class="panel">
        <h1>Register</h1>
        <form id="registerForm" class="form-grid">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="8"
          />

          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="tenant">Tenant</option>
            <option value="pg_owner">PG Owner</option>
          </select>

          <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <div class="form-footer">
          <span>Already have an account?</span> <a href="/login">Login here</a>
        </div>
        <div id="registerMessage" class="message"></div>
      </div>
    </main>

    <footer class="footer">
      <p>
        Create a secure PGBook account and begin managing your PG workflows.
      </p>
    </footer>
    <script src="/static/js/app.js"></script>
  </body>
</html>
