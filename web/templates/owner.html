<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PGBook | PG Owner</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">PGBook</div>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/owner">Owner</a>
        <button id="logoutButton" class="btn btn-secondary">Logout</button>
      </nav>
    </header>

    <main class="container">
      <section class="panel">
        <h1>PG Owner Console</h1>
        <div id="ownerMessage" class="message"></div>
      </section>

      <section class="grid-layout">
        <article class="panel">
          <h2>My PG</h2>
          <div id="pgInfo"></div>
        </article>
        <article class="panel">
          <h2>Statistics</h2>
          <div id="statsInfo"></div>
        </article>
      </section>

      <section class="panel">
        <h2>PG Management</h2>
        <div class="button-row">
          <a class="btn btn-primary" href="/pg-manage">Create or Update PG</a>
          <a class="btn btn-secondary" href="/room-manage">Add New Room</a>
        </div>
      </section>

      <section class="panel">
        <h2>Rooms</h2>
        <div id="roomList"></div>
      </section>

      <section class="panel">
        <h2>Tenant Requests</h2>
        <div id="tenantRequests"></div>
      </section>

      <section class="panel">
        <h2>Tenants</h2>

        <div id="tenantList"></div>
      </section>

      <section class="panel">
        <h2>Pending Payments</h2>
        <div id="pendingPayments"></div>
      </section>

      <section class="panel">
        <h2>Subscription</h2>
        <div id="subscriptionInfo"></div>
        <form
          id="createSubscriptionForm"
          class="form-grid"
          enctype="multipart/form-data"
        >
          <label for="amount">Payment Amount</label>
          <input
            id="amount"
            name="amount"
            type="number"
            min="1"
            step="0.01"
            required
          />
          <label for="proofFile">Payment Screenshot</label>
          <input id="proofFile" type="file" name="proof" accept="image/*" />
          <label for="proofUrl">Payment Proof URL (optional)</label>
          <input id="proofUrl" name="proof_url" />
          <label for="planName">Plan Name</label>
          <input id="planName" name="plan_name" placeholder="e.g., Monthly" />
          <button type="submit" class="btn btn-primary">
            Request Subscription
          </button>
        </form>
      </section>

      <section class="panel">
        <h2>Payment QR Codes</h2>
        <div id="qrCodesInfo"></div>
      </section>
    </main>

    <footer class="footer">
      <p>
        Owner dashboard with PG, room, tenant, payment and subscription
        controls.
      </p>
    </footer>
    <script src="/static/js/app.js"></script>
  </body>
</html>
