<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PGBook | Manage PG</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">PGBook</div>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/owner">Owner Dashboard</a>
        <a href="/pg-manage">Manage PG</a>
        <button id="logoutButton" class="btn btn-secondary">Logout</button>
      </nav>
    </header>

    <main class="container">
      <section class="panel">
        <h1>Manage PG</h1>
        <div id="pgMessage" class="message"></div>
      </section>

      <section class="panel">
        <h2>Current PG Information</h2>
        <div id="pgInfo"></div>
      </section>

      <section class="panel form-panel">
        <h2>Create or Update PG</h2>
        <form id="createPGForm" class="form-grid">
          <label for="pgName">PG Name</label>
          <input id="pgName" name="name" required />
          <label for="ownerName">Owner Name</label>
          <input id="ownerName" name="owner_name" required />
          <label for="pgAddress">Address</label>
          <input id="pgAddress" name="address" required />
          <label for="pgPhone">Phone</label>
          <input id="pgPhone" name="phone" required />
          <button type="submit" class="btn btn-primary">
            Create / Update PG
          </button>
        </form>
      </section>

      <section class="panel">
        <h2>Rooms</h2>
        <div id="roomList"></div>
        <form id="createRoomForm" class="form-grid">
          <label for="roomNumber">Room Number</label>
          <input id="roomNumber" name="room_number" required />
          <label for="sharingType">Sharing Type</label>
          <input id="sharingType" name="sharing_type" required />
          <label for="rentAmount">Rent Amount</label>
          <input
            id="rentAmount"
            name="rent_amount"
            type="number"
            min="1"
            step="0.01"
            required
          />
          <label for="capacity">Capacity</label>
          <input id="capacity" name="capacity" type="number" min="1" required />
          <button type="submit" class="btn btn-primary">Add Room</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p>Create, update, and manage your PG properties and rooms.</p>
    </footer>
    <script src="/static/js/app.js"></script>
  </body>
</html>
